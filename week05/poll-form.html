<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>

    </header>
    <main>
        <form action="">
            <div class="form-item">
                <label for="fullname">User's full name</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>
            <div class="form-item colum2">
                <label for="useremail"> user's email address</label>
                <input type="email" id="useremail" name="useremail" required>
            </div>
            <div class="colum1"></div>
            <label for="browser">What is your favorite browser</label>
            <select name="browser" id="browser">
                <option value="chrome">safari</option>
                <option value="chrome">chrome</option>
                <option value="chrome">Edge</option>
                <option value="chrome">Brave</option>
                <option value="chrome">Other</option>
            </select>
            </div>
            <label for="pet">do you have a household pet?</label>
            <input type="checkbox" id="pet" name="pet">
            <label for="feedback">List the places you have lived:</label>
            <textarea name="feedback" id="feedback" rows="4"
                placeholder="Stillwater Florida, Amsterdam Netherlands, Tibuktu Mali"></textarea>
            <button type="submit">Submit poll</button>





        </form>
    </main>
    <footer>

    </footer>
</body>

</html>
